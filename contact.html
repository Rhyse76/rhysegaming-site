<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Rhyse Gaming</title>
<link rel="icon" href="logo.png">

<style>
  /* Inherited from your main page */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #020617, #000);
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    pointer-events: none;
  }

  .logo img {
    width: 180px; /* Slightly smaller for the contact page */
    margin-top: 20px;
    animation: glowPulse 3s infinite;
    cursor: pointer;
  }

  @keyframes glowPulse {
    0% { filter: drop-shadow(0 0 10px #3b82f6); }
    50% { filter: drop-shadow(0 0 30px #3b82f6); }
    100% { filter: drop-shadow(0 0 10px #3b82f6); }
  }

  /* Contact Specific Card Styling */
  .card {
    max-width: 500px;
    width: 90%;
    margin: 40px auto;
    padding: 30px;
    border-radius: 15px;
    background: #0f172a;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    text-align: left;
  }

  h2 { margin-top: 0; color: #3b82f6; }
  p { opacity: 0.7; font-size: 14px; margin-bottom: 25px; }

  /* Form Elements */
  .form-group { margin-bottom: 20px; }
  
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: bold;
    color: #94a3b8;
    text-transform: uppercase;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
    outline: none;
    transition: 0.3s;
  }

  input:focus, textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    border: none;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
  }

  .btn:hover {
    background: #3b82f6;
    box-shadow: 0 0 12px #3b82f6;
  }

  .back-link {
    margin-top: 20px;
    text-decoration: none;
    color: #64748b;
    font-size: 14px;
    transition: 0.3s;
  }

  .back-link:hover { color: #3b82f6; }

  /* Hidden Honeypot */
  .hidden { display: none; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo" onclick="window.location.href='index.html'">
  <img src="logo.png" alt="Rhyse Gaming Logo">
</div>

<div class="card">
  <h2>Contact Support</h2>
  <p>Have questions about the ARK servers or Discord? Drop a message below.</p>
  
  <form action="https://formspree.io/f/mwvwenpn" method="POST">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" name="name" placeholder="Survivor Name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="email@example.com" required>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea name="message" rows="5" placeholder="What's on your mind?" required></textarea>
    </div>

    <input type="text" name="_gotcha" class="hidden">

    <button type="submit" class="btn">Send Message</button>
  </form>
</div>

<a href="index.html" class="back-link">← Return to Servers</a>

<script>
// This is your exact particle system from the main page
const c=document.getElementById('particles');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  x.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.y+=0.5;
    if(a.y>c.height)a.y=0;
    x.beginPath();
    x.arc(a.x,a.y,2,0,6.28);
    x.fillStyle="#60a5fa";
    x.fill();
    p.forEach(b=>{
      let dx=a.x-b.x;
      let dy=a.y-b.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<80){
        x.strokeStyle="rgba(96,165,250,0.2)";
        x.beginPath();
        x.moveTo(a.x,a.y);
        x.lineTo(b.x,b.y);
        x.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
}
draw();

window.addEventListener('resize', () => {
  c.width = innerWidth;
  c.height = innerHeight;
});
</script>

</body>
</html>
