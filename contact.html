<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Rhyse Gaming</title>
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="icon" href="logo.png">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #020617, #000);
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    pointer-events: none;
  }

  .logo img {
    width: 200px;
    margin-top: 20px;
    animation: glowPulse 3s infinite;
    cursor: pointer;
  }

  @keyframes glowPulse {
    0% { filter: drop-shadow(0 0 10px #3b82f6); }
    50% { filter: drop-shadow(0 0 30px #3b82f6); }
    100% { filter: drop-shadow(0 0 10px #3b82f6); }
  }

  .card {
    max-width: 500px;
    width: 90%;
    margin: 30px auto;
    padding: 30px;
    border-radius: 15px;
    background: #0f172a;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    text-align: left;
    transition: 0.3s;
  }

  h2 { margin-top: 0; color: #3b82f6; font-size: 24px; }
  p { opacity: 0.7; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

  .form-group { margin-bottom: 20px; position: relative; }
  
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: bold;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
    outline: none;
    transition: 0.3s;
  }

  input:focus, textarea:focus {
    border-color: #3b82f6;
  }

  /* Character Counter Styling */
  #char-count {
    position: absolute;
    right: 0;
    bottom: -18px;
    font-size: 11px;
    color: #64748b;
  }

  .limit-near { color: #ef4444 !important; font-weight: bold; }

  .btn {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    border: none;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
    margin-top: 10px;
  }

  .btn:hover {
    background: #3b82f6;
    box-shadow: 0 0 12px #3b82f6;
  }

  .btn:disabled {
    background: #1e293b;
    color: #64748b;
    cursor: not-allowed;
  }

  .back-link {
    margin-top: 10px;
    text-decoration: none;
    color: #64748b;
    font-size: 14px;
    transition: 0.3s;
    display: inline-block;
  }

  .hidden { display: none; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo" onclick="window.location.href='index.html'">
  <img src="logo.png" alt="Rhyse Gaming">
</div>

<div class="card">
  <h2>Contact Us</h2>
  <p>Fill out the form below and we'll get back to you as soon as possible.</p>
  
  <form id="contact-form" action="https://formspree.io/f/mwvwenpn" method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Survivor Name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="email@example.com" required>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea id="message" name="message" rows="5" placeholder="How can we help?" maxlength="500" required></textarea>
      <div id="char-count">0 / 500</div>
    </div>

    <input type="text" name="_gotcha" class="hidden">

    <button type="submit" id="submit-btn" class="btn">Send Message</button>
  </form>
</div>

<a href="index.html" class="back-link">← Return to Servers</a>

<script>
// --- CHARACTER COUNTER LOGIC ---
const msgArea = document.getElementById("message");
const charCount = document.getElementById("char-count");

msgArea.addEventListener("input", () => {
  const length = msgArea.value.length;
  charCount.innerText = `${length} / 500`;
  
  if (length >= 450) {
    charCount.classList.add("limit-near");
  } else {
    charCount.classList.remove("limit-near");
  }
});

// --- FORM HANDLING ---
const form = document.getElementById("contact-form");
const btn = document.getElementById("submit-btn");

async function handleSubmit(event) {
  event.preventDefault();
  btn.innerHTML = "Sending...";
  btn.disabled = true;

  const data = new FormData(event.target);

  fetch(event.target.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  }).then(async response => {
    if (response.ok) {
      window.location.href = "index.html?status=sent";
    } else {
      const errorData = await response.json();
      alert("Error: " + (errorData.error || "Submission failed"));
      btn.innerHTML = "Send Message";
      btn.disabled = false;
    }
  }).catch(error => {
    alert("Network error. Please try again.");
    btn.innerHTML = "Send Message";
    btn.disabled = false;
  });
}

form.addEventListener("submit", handleSubmit);

// --- PARTICLE SYSTEM ---
const c=document.getElementById('particles');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;
let p=[];
for(let i=0;i<80;i++){ p.push({x:Math.random()*c.width,y:Math.random()*c.height}); }

function draw(){
  x.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.y+=0.5;
    if(a.y>c.height)a.y=0;
    x.beginPath();
    x.arc(a.x,a.y,2,0,6.28);
    x.fillStyle="#60a5fa";
    x.fill();
    p.forEach(b=>{
      let dx=a.x-b.x, dy=a.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<80){
        x.strokeStyle="rgba(96,165,250,0.2)";
        x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
}
draw();
window.addEventListener('resize', () => { c.width = innerWidth; c.height = innerHeight; });
</script>

</body>
</html>
