<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Rhyse Gaming</title>
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --blue-primary: #2563eb;
  --blue-glow: #3b82f6;
  --bg-dark: #020617;
  --card-bg: #0f172a;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at center, var(--bg-dark), #000);
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  pointer-events: none;
}

/* Navigation & Mobile Menu */
nav {
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 10000;
  padding: 15px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

.nav-logo {
  font-weight: bold;
  font-size: 1.2rem;
  color: var(--blue-glow);
  text-decoration: none;
  letter-spacing: 1px;
}

.nav-links {
  display: flex;
  gap: 15px;
}

.menu-toggle {
  display: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: white;
}

/* Content Area */
.content { flex: 1; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }

.logo img {
  width: 200px;
  margin-top: 10px;
  animation: glowPulse 3s infinite;
  cursor: pointer;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 10px var(--blue-glow)); }
  50% { filter: drop-shadow(0 0 25px var(--blue-glow)); }
  100% { filter: drop-shadow(0 0 10px var(--blue-glow)); }
}

.card {
  max-width: 500px;
  width: 90%;
  margin: 30px auto;
  padding: 30px;
  border-radius: 15px;
  background: var(--card-bg);
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
  text-align: left;
}

h2 { margin-top: 0; color: var(--blue-glow); font-size: 24px; }
p.subtitle { opacity: 0.7; font-size: 14px; margin-bottom: 25px; line-height: 1.5; text-align: left; }

/* Form Styling */
.form-group { margin-bottom: 20px; position: relative; }
label {
  display: block;
  margin-bottom: 8px;
  font-size: 11px;
  font-weight: bold;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  box-sizing: border-box;
  outline: none;
  transition: 0.3s;
}

input:focus, textarea:focus { border-color: var(--blue-glow); background: #263449; }

#char-count {
  position: absolute;
  right: 0;
  bottom: -18px;
  font-size: 11px;
  color: #64748b;
}

.limit-near { color: #ef4444 !important; font-weight: bold; }

.btn {
  width: 100%;
  padding: 14px;
  background: var(--blue-primary);
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
  margin-top: 10px;
}

.btn:hover {
  background: var(--blue-glow);
  box-shadow: 0 0 12px var(--blue-glow);
}

.btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }

.back-link {
  margin-top: 15px;
  text-decoration: none;
  color: #64748b;
  font-size: 14px;
  transition: 0.3s;
  display: inline-block;
}
.back-link:hover { color: var(--blue-glow); }

.hidden { display: none; }

/* Mobile Navigation Logic */
@media (max-width: 768px) {
  .menu-toggle { display: block; }
  .nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: var(--card-bg);
    padding: 20px 0;
    border-bottom: 1px solid #1e293b;
  }
  .nav-links.active { display: flex; }
  .nav-links .btn { margin: 10px 20%; width: 60%; }
}

/* Footer Styling */
footer {
  padding: 30px 20px;
  margin-top: 50px;
  background: rgba(15, 23, 42, 0.8);
  border-top: 1px solid #1e293b;
}

.copyright { font-size: 0.9rem; color: #94a3b8; }
.copyright span { color: var(--blue-glow); font-weight: bold; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
  <a href="index.html" class="nav-logo">RHYSE GAMING</a>
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>
  <div class="nav-links" id="navLinks">
    <button class="btn" style="background:#5865F2;" onclick="window.open('https://discord.gg/xJM3Nkce8Y','_blank')">
      <i class="fab fa-discord"></i> Discord
    </button>
    <button class="btn" onclick="window.location.href='index.html'">
      <i class="fas fa-server"></i> Servers
    </button>
  </div>
</nav>

<div class="content">
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="logo.png" alt="Rhyse Gaming">
  </div>

  <div class="card">
    <h2>Contact Us</h2>
    <p class="subtitle">Survivor support. Send us a message and we'll get back to you as soon as possible.</p>
    
    <form id="contact-form" action="https://formspree.io/f/mwvwenpn" method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Survivor Name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message" name="message" rows="5" placeholder="How can we help?" maxlength="500" required></textarea>
        <div id="char-count">0 / 500</div>
      </div>

      <input type="text" name="_gotcha" class="hidden">

      <button type="submit" id="submit-btn" class="btn">Send Message</button>
    </form>
  </div>

  <a href="index.html" class="back-link">← Return to Servers</a>
</div>

<footer>
  <p class="copyright">&copy; <span>2026</span> Rhyse Gaming. All Rights Reserved.</p>
</footer>

<script>
// --- MOBILE MENU ---
function toggleMenu() {
  document.getElementById('navLinks').classList.toggle('active');
}

// --- CHARACTER COUNTER ---
const msgArea = document.getElementById("message");
const charCount = document.getElementById("char-count");

msgArea.addEventListener("input", () => {
  const length = msgArea.value.length;
  charCount.innerText = `${length} / 500`;
  if (length >= 450) { charCount.classList.add("limit-near"); } 
  else { charCount.classList.remove("limit-near"); }
});

// --- FORM HANDLING ---
const form = document.getElementById("contact-form");
const btn = document.getElementById("submit-btn");

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  btn.innerHTML = "Sending...";
  btn.disabled = true;

  const data = new FormData(event.target);

  fetch(event.target.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  }).then(async response => {
    if (response.ok) {
      window.location.href = "index.html?status=sent";
    } else {
      const errorData = await response.json();
      alert("Error: " + (errorData.error || "Submission failed"));
      btn.innerHTML = "Send Message";
      btn.disabled = false;
    }
  }).catch(error => {
    alert("Network error. Please try again.");
    btn.innerHTML = "Send Message";
    btn.disabled = false;
  });
});

// --- RESTORED PARTICLE SYSTEM (Connected) ---
const c=document.getElementById('particles');
const x=c.getContext('2d');
c.width=innerWidth; c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){ 
  p.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx: (Math.random() - 0.5) * 0.2,
    vy: 0.5 
  }); 
}

function draw(){
  x.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.y += a.vy; a.x += a.vx;
    if(a.y > c.height) a.y = 0;
    if(a.x > c.width) a.x = 0;
    if(a.x < 0) a.x = c.width;

    x.beginPath(); x.arc(a.x,a.y,2,0,6.28); x.fillStyle="#60a5fa"; x.fill();

    p.forEach(b=>{
      let dx = a.x - b.x, dy = a.y - b.y, dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 90){
        x.strokeStyle = `rgba(96, 165, 250, ${1 - dist/90 * 0.5})`;
        x.lineWidth = 0.5;
        x.beginPath(); x.moveTo(a.x, a.y); x.lineTo(b.x, b.y); x.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
}
draw();
window.addEventListener('resize', () => { c.width = innerWidth; c.height = innerHeight; });
</script>

<div style="position: fixed; bottom: 15px; right: 15px; opacity: 0.15;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.15'">
  <a href="http://100.67.222.11:3001/" target="_blank" style="text-decoration: none; font-size: 20px;">⚙️</a>
</div>

</body>
</html>
