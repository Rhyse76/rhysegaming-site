<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Rhyse Gaming</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --blue-primary: #2563eb;
  --blue-glow: #3b82f6;
  --bg-dark: #020617;
  --card-bg: rgba(15, 23, 42, 0.7);
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at center, var(--bg-dark), #000);
  color: white;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

nav {
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 10000;
  padding: 15px 5%;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.nav-logo { font-weight: bold; font-size: 1.2rem; color: var(--blue-glow); text-decoration: none; letter-spacing: 1px; }

.nav-links { display: flex; gap: 15px; }

.menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: white; }

.content { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

.logo img {
  width: 180px;
  animation: glowPulse 3s infinite ease-in-out;
  cursor: pointer;
  margin-bottom: 20px;
}

@keyframes glowPulse {
  0%, 100% { filter: drop-shadow(0 0 10px var(--blue-glow)); transform: scale(1); }
  50% { filter: drop-shadow(0 0 25px var(--blue-glow)); transform: scale(1.02); }
}

.card {
  max-width: 500px; width: 100%;
  padding: 40px; border-radius: 15px;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  text-align: left;
}

h2 { margin-top: 0; color: var(--blue-glow); font-size: 24px; letter-spacing: 1px; }
p.subtitle { opacity: 0.6; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }

.form-group { margin-bottom: 25px; position: relative; }
label {
  display: block; margin-bottom: 10px;
  font-size: 11px; font-weight: bold;
  color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
}

input, textarea {
  width: 100%; padding: 14px;
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px; color: white;
  font-size: 16px; transition: 0.3s;
}

input:focus, textarea:focus { border-color: var(--blue-glow); background: rgba(30, 41, 59, 0.8); outline: none; }

#char-count { position: absolute; right: 0; bottom: -20px; font-size: 11px; color: #64748b; }
.limit-near { color: #ef4444 !important; font-weight: bold; }

.btn {
  width: 100%; padding: 15px;
  background: var(--blue-primary);
  border-radius: 8px; color: white;
  cursor: pointer; border: none;
  font-weight: bold; font-size: 16px;
  transition: 0.3s; margin-top: 10px;
}

.btn:hover { background: var(--blue-glow); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
.btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; transform: none; }

.back-link { margin-top: 25px; text-decoration: none; color: #64748b; font-size: 14px; transition: 0.2s; }
.back-link:hover { color: var(--blue-glow); }

.hidden { display: none; }

@media (max-width: 768px) {
  .menu-toggle { display: block; }
  .nav-links {
    display: none; flex-direction: column;
    position: absolute; top: 100%; left: 0; width: 100%;
    background: rgba(15, 23, 42, 0.95); padding: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  .nav-links.active { display: flex; }
  .nav-links .btn { margin-bottom: 10px; }
}

footer { padding: 40px 20px; background: rgba(2, 6, 23, 0.8); border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
.copyright { font-size: 0.9rem; color: #64748b; }
.copyright span { color: var(--blue-glow); }
</style>
</head>

<body>
<canvas id="particles"></canvas>

<nav>
  <a href="index.html" class="nav-logo">RHYSE GAMING</a>
  <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  <div class="nav-links" id="navLinks">
    <button class="btn" style="background:#5865F2;" onclick="window.open('https://discord.gg/xJM3Nkce8Y')"><i class="fab fa-discord"></i> Discord</button>
    <button class="btn" onclick="window.location.href='index.html'"><i class="fas fa-server"></i> Servers</button>
  </div>
</nav>

<div class="content">
  <div class="logo" onclick="window.location.href='index.html'"><img src="logo.png" alt="Rhyse Gaming"></div>

  <div class="card">
    <h2>Contact Us</h2>
    <p class="subtitle">Survivor support. Send us a message and the admin team will get back to you shortly.</p>
    
    <form id="contact-form" action="https://formspree.io/f/mwvwenpn" method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Survivor Name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message" name="message" rows="5" placeholder="What's going on in the cluster?" maxlength="500" required></textarea>
        <div id="char-count">0 / 500</div>
      </div>

      <input type="text" name="_gotcha" class="hidden">
      <button type="submit" id="submit-btn" class="btn">Send Message</button>
    </form>
  </div>

  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Servers</a>
</div>

<footer>
  <p class="copyright">&copy; <span>2026</span> <strong>Rhyse Gaming</strong>. All Rights Reserved.</p>
</footer>

<script>
function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }

const msgArea = document.getElementById("message");
const charCount = document.getElementById("char-count");

msgArea.addEventListener("input", () => {
  const length = msgArea.value.length;
  charCount.innerText = `${length} / 500`;
  length >= 450 ? charCount.classList.add("limit-near") : charCount.classList.remove("limit-near");
});

const form = document.getElementById("contact-form");
const btn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Sending...";
  btn.disabled = true;

  fetch(e.target.action, {
    method: 'POST',
    body: new FormData(e.target),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if (response.ok) { window.location.href = "index.html?status=sent"; } 
    else { alert("Submission failed. Please try again."); btn.innerHTML = "Send Message"; btn.disabled = false; }
  }).catch(() => {
    alert("Network error."); btn.innerHTML = "Send Message"; btn.disabled = false;
  });
});

// --- MATCHING PARTICLE SYSTEM ---
const c=document.getElementById('particles'); const x=c.getContext('2d');
let p=[]; let mouse = { x: null, y: null };
window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
window.onresize = () => { c.width = innerWidth; c.height = innerHeight; };
c.width = innerWidth; c.height = innerHeight;
for(let i=0;i<80;i++) p.push({ x:Math.random()*c.width, y:Math.random()*c.height, vx:(Math.random()-0.5)*0.3, vy:0.6 });
function draw(){
  x.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    a.y += a.vy; a.x += a.vx;
    if(a.y > c.height) a.y = 0; if(a.x > c.width) a.x = 0; if(a.x < 0) a.x = c.width;
    let dx = a.x - mouse.x, dy = a.y - mouse.y, dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 120) { a.x += dx/20; a.y += dy/20; }
    x.beginPath(); x.arc(a.x,a.y,1.5,0,6.28); x.fillStyle="rgba(96, 165, 250, 0.8)"; x.fill();
    p.forEach(b=>{
      let d2 = Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
      if(d2 < 100){
        x.strokeStyle = `rgba(96, 165, 250, ${1 - d2/100 * 0.3})`;
        x.lineWidth = 0.5; x.beginPath(); x.moveTo(a.x, a.y); x.lineTo(b.x, b.y); x.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
}
draw();
</script>

<div style="position: fixed; bottom: 15px; right: 15px; opacity: 0.15;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.15'">
  <a href="http://100.67.222.11:3001/" target="_blank" style="text-decoration: none;">⚙️</a>
</div>

</body>
</html>
