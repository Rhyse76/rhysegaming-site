<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.logo img {
  width: 260px;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #3b82f6); }
  to { filter: drop-shadow(0 0 25px #60a5fa); }
}

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  background: #0f172a;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island { background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
.astra { background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
.rag { background: url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

.btn {
  margin: 6px;
  padding: 10px 18px;
  background: #2563eb;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}

.btn:hover {
  background: #1d4ed8;
  transform: scale(1.05);
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 12px 22px;
  border-radius: 8px;
  display: none;
}

.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(6px);
  z-index: 999;
}

.modal-content {
  background: #0f172a;
  padding: 25px;
  border-radius: 12px;
  animation: pop 0.2s ease forwards;
  box-shadow: 0 0 30px rgba(96,165,250,0.7);
}

@keyframes pop {
  from { transform: scale(0.9); }
  to { transform: scale(1); }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo">
  <img src="logo.png">
</div>

<div id="servers"></div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>🎮 Join Server</h2>
    <p id="command"></p>
    <button class="btn" id="closeModal">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const servers = [
  {name:"Island", id:"island", port:7777},
  {name:"Astraeos", id:"astra", port:7877},
  {name:"Ragnarok", id:"rag", port:7977}
];

const container = document.getElementById("servers");

// BUILD UI
servers.forEach(s=>{
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="banner ${s.id}"><h2>${s.name}</h2></div>
    <div>
      <div id="${s.id}-status">Checking...</div>

      <button class="btn">🚀 Play</button>
      <button class="btn">📋 Copy</button>
      <button class="btn">💬 How</button>
    </div>
  `;

  const [playBtn, copyBtn, howBtn] = card.querySelectorAll("button");

  // 🚀 PLAY
  playBtn.onclick = () => {
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = `steam://connect/ark.rhysegaming.com:${s.port}`;
    document.body.appendChild(iframe);

    setTimeout(()=>showModal(s.port), 1000);
  };

  // 📋 COPY
  copyBtn.onclick = () => {
    const text = `ark.rhysegaming.com:${s.port}`;
    navigator.clipboard.writeText(text);
    toast(`Copied ${text}`);
  };

  // 💬 HOW
  howBtn.onclick = () => {
    showModal(s.port);
  };

  container.appendChild(card);
});

// MODAL
function showModal(port){
  const modal = document.getElementById("modal");
  const command = document.getElementById("command");

  modal.style.display = "flex";
  command.innerText = `Press ~ in ARK and paste:\nopen ark.rhysegaming.com:${port}`;
}

window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
}

// TOAST
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

// STATUS
async function check(id,el){
 try{
  const r=await fetch(`https://api.battlemetrics.com/servers/${id}`);
  const d=await r.json();
  const s=d.data.attributes;

  document.getElementById(el).innerHTML =
  s.status==="online"
  ? `<span class="online">Online (${s.players})</span>`
  : `<span class="offline">Offline</span>`;
 }catch{
  document.getElementById(el).innerHTML=`<span class="offline">Offline</span>`;
 }
}

function refresh(){
 check("38310501","island-status");
 check("38356867","astra-status");
 check("38381239","rag-status");
}

refresh();
setInterval(refresh,30000);

});
</script>

</body>
</html>
