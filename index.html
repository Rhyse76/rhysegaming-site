<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

/* HERO BANNER */
.hero {
  height: 300px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(2,6,23,1)),
              url('https://picsum.photos/1600/600?random=1') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero h1 {
  font-size: 50px;
  margin: 0;
}

.hero p {
  color: #94a3b8;
}

/* CARDS */
.container {
  padding: 40px 20px;
}

.card {
  border-radius: 15px;
  margin: 20px auto;
  max-width: 420px;
  overflow: hidden;
  background: #0f172a;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(37,99,235,0.6);
}

.banner {
  height: 180px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

/* UNIQUE MAP COLORS (acts like custom banners) */
.island { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://picsum.photos/seed/island/800/400'); }
.astra { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://picsum.photos/seed/astra/800/400'); }
.rag { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://picsum.photos/seed/rag/800/400'); }

h2 {
  margin: 0;
}

.content {
  padding: 15px;
}

.status {
  font-size: 14px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

.btn:hover {
  background: #1d4ed8;
}

.footer {
  margin-top: 40px;
  color: #64748b;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>RHYSE GAMING</h1>
  <p>ARK Survival Ascended Cluster</p>
</div>

<div class="container">

<!-- Island -->
<div class="card">
  <div class="banner island">
    <h2>🌍 Island</h2>
  </div>
  <div class="content">
    <div id="island-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7777">Join Server</a>
  </div>
</div>

<!-- Astraeos -->
<div class="card">
  <div class="banner astra">
    <h2>🪨 Astraeos</h2>
  </div>
  <div class="content">
    <div id="astra-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7877">Join Server</a>
  </div>
</div>

<!-- Ragnarok -->
<div class="card">
  <div class="banner rag">
    <h2>🔥 Ragnarok</h2>
  </div>
  <div class="content">
    <div id="rag-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7977">Join Server</a>
  </div>
</div>

<!-- Discord -->
<div class="card">
  <div class="content">
    <h2>💬 Discord</h2>
    <a class="btn" href="https://discord.gg/vm8tstWJTh">Join Community</a>
  </div>
</div>

<div class="footer">
© Rhyse Gaming
</div>

</div>

<script>
async function checkServer(ip, port, elementId) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers?filter[search]=${ip}:${port}`);
    const data = await res.json();

    if (data.data.length > 0) {
      const s = data.data[0];
      document.getElementById(elementId).innerHTML =
        `<span class="online">● Online</span> (${s.attributes.players}/${s.attributes.maxPlayers})`;
    } else {
      document.getElementById(elementId).innerHTML =
        `<span class="offline">● Offline</span>`;
    }
  } catch {
    document.getElementById(elementId).innerHTML =
      `<span class="offline">● Unknown</span>`;
  }
}

function refreshAll() {
  checkServer("ark.rhysegaming.com", 7777, "island-status");
  checkServer("ark.rhysegaming.com", 7877, "astra-status");
  checkServer("ark.rhysegaming.com", 7977, "rag-status");
}

refreshAll();
setInterval(refreshAll, 30000);
</script>

</body>
</html>
