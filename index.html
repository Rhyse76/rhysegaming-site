<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1') no-repeat center center/cover;
  color: white;
  text-align: center;
}

.overlay {
  background: rgba(2,6,23,0.85);
  min-height: 100vh;
}

.container {
  padding: 60px 20px;
}

.logo {
  font-size: 50px;
  font-weight: bold;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.tagline {
  color: #94a3b8;
  margin-bottom: 40px;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 15px;
  padding: 20px;
  margin: 20px auto;
  max-width: 420px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px rgba(37,99,235,0.6);
}

.server-img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status {
  margin-top: 10px;
  font-size: 16px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.btn {
  display: inline-block;
  margin-top: 12px;
  padding: 12px 25px;
  font-size: 18px;
  color: white;
  background: #2563eb;
  border-radius: 10px;
  text-decoration: none;
  box-shadow: 0 0 12px rgba(37,99,235,0.6);
}

.btn:hover {
  background: #1d4ed8;
  box-shadow: 0 0 20px rgba(37,99,235,1);
}

.footer {
  margin-top: 50px;
  font-size: 14px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="logo">RHYSE GAMING</div>
<div class="tagline">ASA Cluster • Smooth Gameplay • No BS</div>

<div class="card">
  <img class="server-img" src="https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/f/f7/TheIsland.jpg">
  <h2>🌍 Island</h2>
  <div id="island-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7777">Join</a>
</div>

<div class="card">
  <img class="server-img" src="https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/3/3a/Ragnarok.jpg">
  <h2>🪨 Astraeos</h2>
  <div id="astra-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7877">Join</a>
</div>

<div class="card">
  <img class="server-img" src="https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/0/0f/RagnarokLandscape.jpg">
  <h2>🔥 Ragnarok</h2>
  <div id="rag-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7977">Join</a>
</div>

<div class="card">
  <h2>💬 Discord</h2>
  <a class="btn" href="https://discord.gg/YOURCODE">Join Community</a>
</div>

<div class="footer">
© Rhyse Gaming
</div>

</div>
</div>

<script>
async function checkServer(ip, port, elementId) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers?filter[search]=${ip}:${port}`);
    const data = await res.json();

    if (data.data.length > 0) {
      const server = data.data[0];
      document.getElementById(elementId).innerHTML =
        `<span class="online">● Online</span> (${server.attributes.players}/${server.attributes.maxPlayers})`;
    } else {
      document.getElementById(elementId).innerHTML =
        `<span class="offline">● Offline</span>`;
    }
  } catch {
    document.getElementById(elementId).innerHTML =
      `<span class="offline">● Unknown</span>`;
  }
}

function refreshAll() {
  checkServer("ark.rhysegaming.com", 7777, "island-status");
  checkServer("ark.rhysegaming.com", 7877, "astra-status");
  checkServer("ark.rhysegaming.com", 7977, "rag-status");
}

refreshAll();
setInterval(refreshAll, 30000);
</script>

</body>
</html>
