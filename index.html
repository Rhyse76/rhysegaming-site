<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<!-- FAVICON -->
<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.hero { padding: 60px 20px 30px; }

.logo img {
  width: 260px;
  filter: drop-shadow(0 0 10px #3b82f6);
  animation: glow 2.5s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #3b82f6); }
  to { filter: drop-shadow(0 0 25px #60a5fa); }
}

.nav a {
  margin: 0 12px;
  color: #60a5fa;
  text-decoration: none;
  font-weight: bold;
}

.nav a:hover { color: white; }

.container { padding: 20px; }

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  overflow: hidden;
  background: #0f172a;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
  transition: 0.3s;
}

.card:hover { transform: scale(1.02); }

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
}

.astra {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
  url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa');
}

.rag {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
  url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c');
}

.content { padding: 15px; }

.online { color: #22c55e; }
.offline { color: #ef4444; }

.btn {
  display: inline-block;
  margin: 6px;
  padding: 10px 18px;
  background: #2563eb;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  cursor: pointer;
}

.btn:hover { background: #1d4ed8; }

.small-btn { background: #334155; }

.footer { margin: 40px; color: #64748b; }

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="nav">
    <a href="#servers">Servers</a>
    <a href="https://discord.gg/vm8tstWJTh" target="_blank">Discord</a>
  </div>
</div>

<div id="servers" class="container">

<script>
function serverCard(name, id, bannerClass, port) {
  return `
  <div class="card">
    <div class="banner ${bannerClass}">
      <h2>${name}</h2>
    </div>
    <div class="content">
      <div id="${id}-status">Checking...</div>

      <a class="btn" href="#" onclick="launchSteam(${port})">🚀 Play Now</a>
      <button class="btn small-btn" onclick="copyIP(${port})">📋 Copy IP</button>
      <button class="btn small-btn" onclick="showCommand(${port})">💬 How to Join</button>
    </div>
  </div>
  `;
}

document.write(serverCard("🌍 Island","island","island",7777));
document.write(serverCard("🪨 Astraeos","astra","astra",7877));
document.write(serverCard("🔥 Ragnarok","rag","rag",7977));
</script>

<div class="card">
  <h2>💬 Join Our Community</h2>
  <a class="btn" href="https://discord.gg/vm8tstWJTh" target="_blank">Join Discord</a>
</div>

</div>

<div class="footer">© Rhyse Gaming</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Join via Console</h3>
    <p id="command"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
function copyIP(port) {
  const text = `ark.rhysegaming.com:${port}`;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

function launchSteam(port) {
  window.location.href = `steam://connect/ark.rhysegaming.com:${port}`;
}

function showCommand(port) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("command").innerText =
    `open ark.rhysegaming.com:${port}`;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ✅ FIXED SERVER STATUS
async function checkServer(serverId, elementId) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers/${serverId}`);
    const data = await res.json();
    const s = data.data.attributes;

    if (s.status !== "online") {
      document.getElementById(elementId).innerHTML =
        `<span class="offline">● Offline</span>`;
      return;
    }

    document.getElementById(elementId).innerHTML =
      `<span class="online">● Online</span> (${s.players}/${s.maxPlayers})`;

  } catch {
    document.getElementById(elementId).innerHTML =
      `<span class="offline">● Offline</span>`;
  }
}

function refresh() {
  checkServer("38310501", "island-status");
  checkServer("38356867", "astra-status");
  checkServer("38381239", "rag-status");
}

refresh();
setInterval(refresh, 30000);

// ✨ IMPROVED PARTICLES
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.7
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.y += p.speed;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = "rgba(96,165,250,0.8)";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#60a5fa";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
