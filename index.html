<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  pointer-events: none;
}

/* LOGO GLOW */
.logo img {
  width: 260px;
  margin-top: 20px;
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%   { filter: drop-shadow(0 0 10px rgba(59,130,246,0.5)); }
  50%  { filter: drop-shadow(0 0 30px rgba(59,130,246,1)); }
  100% { filter: drop-shadow(0 0 10px rgba(59,130,246,0.5)); }
}

/* CARDS */
.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  background: #0f172a;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
}

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island { background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
.astra { background:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
.rag { background:url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

/* BUTTONS */
.btn {
  margin: 6px;
  padding: 10px 18px;
  background: #2563eb;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}

.btn:hover {
  background: #3b82f6;
  box-shadow: 0 0 12px #3b82f6, 0 0 20px #3b82f6;
}

/* DISCORD */
.discord {
  background: #5865F2;
}
.discord:hover {
  background: #6d78ff;
  box-shadow: 0 0 15px #5865F2;
}

/* STATUS */
.online {
  color:#22c55e;
  text-shadow: 0 0 8px #22c55e;
}

.offline {
  color:#ef4444;
}

/* 🔥 PLAYER BAR */
.bar {
  width: 80%;
  height: 8px;
  background: #1e293b;
  margin: 8px auto;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: width 0.5s ease;
  box-shadow: 0 0 8px #22c55e;
}

.toast {
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 20px;
  border-radius:6px;
  display:none;
}

.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:#0f172a;
  padding:25px;
  border-radius:10px;
  color:white;
  max-width:400px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo">
  <img src="logo.png">
</div>

<div style="margin-top:10px;">
  <button class="btn discord" onclick="joinDiscord()">Join Discord</button>
</div>

<div id="servers"></div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>🎮 How to Join</h2>
    <p id="command"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const servers = [
  {name:"Island", id:"island", port:7777},
  {name:"Astraeos", id:"astra", port:7877},
  {name:"Ragnarok", id:"rag", port:7977}
];

const container = document.getElementById("servers");

servers.forEach(s=>{
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="banner ${s.id}"><h2>${s.name}</h2></div>
    <div>
      <div id="${s.id}-status">Checking...</div>
    </div>
  `;

  const btnContainer = document.createElement("div");

  const copy = document.createElement("button");
  copy.className = "btn";
  copy.innerText = "📋 Copy IP";

  const how = document.createElement("button");
  how.className = "btn";
  how.innerText = "💬 How to Join";

  copy.onclick = () => {
    const text = `ark.rhysegaming.com:${s.port}`;
    navigator.clipboard.writeText(text);
    toast(`Copied ${text}`);
  };

  how.onclick = () => {
    showModal(s.port);
  };

  btnContainer.appendChild(copy);
  btnContainer.appendChild(how);

  card.appendChild(btnContainer);
  container.appendChild(card);
});

// MODAL
function showModal(port){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("command").innerText =
`1. Open ARK
2. Press ~ (tilde)
3. Paste this:

open ark.rhysegaming.com:${port}`;
}

window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").onclick = (e) => {
  if (e.target.id === "modal") closeModal();
};

// DISCORD
window.joinDiscord = function(){
  window.open("https://discord.gg/xJM3Nkce8Y", "_blank");
}

// TOAST
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

// STATUS (🔥 UPDATED WITH BAR)
async function check(id,el){
 try{
  const r=await fetch(`https://api.battlemetrics.com/servers/${id}`);
  const d=await r.json();
  const s=d.data.attributes;

  document.getElementById(el).innerHTML =
    s.status==="online"
    ? `
      <div class="online">Online (${s.players})</div>
      <div class="bar">
        <div class="fill" style="width:${Math.min(s.players*5,100)}%"></div>
      </div>
    `
    : `<span class="offline">Offline</span>`;
 }catch{
  document.getElementById(el).innerHTML=`<span class="offline">Offline</span>`;
 }
}

function refresh(){
 check("38310501","island-status");
 check("38356867","astra-status");
 check("38381239","rag-status");
}

refresh();
setInterval(refresh,30000);

// PARTICLES
const c=document.getElementById('particles');
if(c){
  const x=c.getContext('2d');
  c.width=innerWidth;
  c.height=innerHeight;

  let p=[];
  for(let i=0;i<100;i++){
    p.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      s:Math.random()*2,
      v:Math.random()*1.5 + 0.2
    });
  }

  function draw(){
    x.clearRect(0,0,c.width,c.height);
    p.forEach(a=>{
      a.y+=a.v;
      if(a.y>c.height){
        a.y=0;
        a.x=Math.random()*c.width;
      }
      x.beginPath();
      x.arc(a.x,a.y,a.s,0,6.28);
      x.fillStyle="#60a5fa";
      x.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

});
</script>

</body>
</html>
