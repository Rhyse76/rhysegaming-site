<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming | Ark Cluster</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --blue-primary: #2563eb;
  --blue-glow: #3b82f6;
  --bg-dark: #020617;
  --card-bg: #0f172a;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at center, var(--bg-dark), #000);
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  pointer-events: none;
}

/* Navigation & Mobile Menu */
nav {
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 10000;
  padding: 15px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

.nav-logo {
  font-weight: bold;
  font-size: 1.2rem;
  color: var(--blue-glow);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 15px;
}

.menu-toggle {
  display: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: white;
}

/* Content */
.content { flex: 1; padding-top: 20px; }

.logo img {
  width: 220px;
  animation: glowPulse 3s infinite;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 10px var(--blue-glow)); }
  50% { filter: drop-shadow(0 0 25px var(--blue-glow)); }
  100% { filter: drop-shadow(0 0 10px var(--blue-glow)); }
}

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  background: var(--card-bg);
  overflow: hidden;
  transition: 0.3s;
}

.card.online-card { box-shadow: 0 0 20px rgba(34,197,94,0.4); }
.card:hover { transform: translateY(-5px); }

.banner {
  height: 180px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
  background-position: center;
}

.island { background:linear-gradient(transparent, var(--card-bg)), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
.astra { background:linear-gradient(transparent, var(--card-bg)), url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
.rag { background:linear-gradient(transparent, var(--card-bg)), url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

.btn {
  margin: 6px;
  padding: 10px 20px;
  background: var(--blue-primary);
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover { background: var(--blue-glow); box-shadow: 0 0 12px var(--blue-glow); }
.discord { background:#5865F2; }

.online { color:#22c55e; font-weight: bold; }
.offline { color:#ef4444; }

/* Mobile Menu Logic */
@media (max-width: 768px) {
  .menu-toggle { display: block; }
  .nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: var(--card-bg);
    padding: 20px 0;
    border-bottom: 1px solid #1e293b;
  }
  .nav-links.active { display: flex; }
  .nav-links .btn { margin: 10px 20%; }
}

/* Toast & Footer */
.toast {
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 20px;
  border-radius:6px;
  display:none;
  z-index:10000;
}

footer {
  padding: 30px 20px;
  margin-top: 50px;
  background: rgba(15, 23, 42, 0.8);
  border-top: 1px solid #1e293b;
}

.copyright { font-size: 0.9rem; color: #94a3b8; }
.copyright span { color: var(--blue-glow); font-weight: bold; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
  <a href="#" class="nav-logo">RHYSE GAMING</a>
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>
  <div class="nav-links" id="navLinks">
    <button class="btn discord" onclick="joinDiscord()"><i class="fab fa-discord"></i> Discord</button>
    <button class="btn" onclick="window.location.href='contact.html'"><i class="fas fa-envelope"></i> Contact</button>
  </div>
</nav>

<div class="content">
  <div class="logo">
    <img src="logo.png" alt="Rhyse Gaming Logo">
  </div>
  <div id="servers"></div>
</div>

<div id="toast" class="toast"></div>

<footer>
  <p class="copyright">&copy; <span>2026</span> Rhyse Gaming. All Rights Reserved.</p>
</footer>

<script>
// Mobile Menu Toggle
function toggleMenu() {
  document.getElementById('navLinks').classList.toggle('active');
}

document.addEventListener("DOMContentLoaded", function(){
  const servers = [
    {name:"The Island", id:"island", port:7777},
    {name:"Astraeos", id:"astra", port:7877},
    {name:"Ragnarok", id:"rag", port:7977}
  ];

  const container = document.getElementById("servers");

  servers.forEach(s=>{
    const card = document.createElement("div");
    card.className = "card";
    card.id = `${s.id}-card`;

    card.innerHTML = `
      <div class="banner ${s.id}"><h2>${s.name}</h2></div>
      <div id="${s.id}-status" style="padding: 20px 15px 10px;">Checking...</div>
    `;

    const btnContainer = document.createElement("div");
    btnContainer.style.paddingBottom = "20px";

    const how = document.createElement("button");
    how.className = "btn";
    how.innerHTML = "<i class='fas fa-gamepad'></i> How to Join";

    how.onclick = () => {
      const command = `open ark.rhysegaming.com:${s.port}`;
      navigator.clipboard.writeText(command);
      toast("✅ Command copied!");
    };

    btnContainer.appendChild(how);
    card.appendChild(btnContainer);
    container.appendChild(card);
  });

  // Discord & Toast
  window.joinDiscord = function(){ window.open("https://discord.gg/xJM3Nkce8Y","_blank"); }
  function toast(msg){
    const t=document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>{ t.style.display = "none"; },2500);
  }

  // API Refresh
  async function check(name, el){
    try {
      const r = await fetch(`https://api.rhysegaming.com/status/${name}`);
      const s = await r.json();
      const card = document.getElementById(el.replace("-status","-card"));
      if(s.online){
        card.classList.add("online-card");
        document.getElementById(el).innerHTML = `<div class="online">Online</div><div style="font-size: 12px; opacity: .6; margin-top:5px;">${s.map}</div>`;
      } else {
        card.classList.remove("online-card");
        document.getElementById(el).innerHTML = `<span class="offline">Offline</span>`;
      }
    } catch {
      document.getElementById(el).innerHTML = `<span class="offline">Offline</span>`;
    }
  }

  function refresh(){ servers.forEach(s => check(s.id, `${s.id}-status`)); }
  refresh();
  setInterval(refresh,30000);

  // Particles (Background)
  const c=document.getElementById('particles');
  const x=c.getContext('2d');
  c.width=innerWidth; c.height=innerHeight;
  let p=[];
  for(let i=0;i<60;i++){ p.push({x:Math.random()*c.width,y:Math.random()*c.height}); }
  function draw(){
    x.clearRect(0,0,c.width,c.height);
    p.forEach(a=>{
      a.y+=0.3; if(a.y>c.height)a.y=0;
      x.beginPath(); x.arc(a.x,a.y,1.5,0,6.28); x.fillStyle="rgba(96,165,250,0.5)"; x.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
});
</script>

<div style="position: fixed; bottom: 15px; right: 15px; opacity: 0.15;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.15'">
  <a href="http://100.67.222.11:3001/" target="_blank" style="text-decoration: none; font-size: 20px;">⚙️</a>
</div>

</body>
</html>
