<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #020617, #0f172a);
  color: white;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

.logo {
  font-size: 50px;
  font-weight: bold;
  letter-spacing: 3px;
}

.tagline {
  color: #94a3b8;
  margin-bottom: 40px;
}

.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  margin: 20px auto;
  max-width: 420px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px rgba(37,99,235,0.8);
}

.server-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  right: 15px;
  text-align: left;
}

h2 {
  margin: 0;
}

.status {
  font-size: 14px;
  margin-top: 5px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 18px;
  font-size: 16px;
  color: white;
  background: #2563eb;
  border-radius: 8px;
  text-decoration: none;
}

.btn:hover {
  background: #1d4ed8;
}

.footer {
  margin-top: 50px;
  font-size: 14px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">RHYSE GAMING</div>
<div class="tagline">ASA Cluster • Smooth Gameplay • No BS</div>

<!-- Island -->
<div class="card">
  <img class="server-img" src="https://cdn.cloudflare.steamstatic.com/steam/apps/346110/ss_3.jpg">
  <div class="overlay"></div>
  <div class="content">
    <h2>🌍 Island</h2>
    <div id="island-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7777">Join</a>
  </div>
</div>

<!-- Astraeos -->
<div class="card">
  <img class="server-img" src="https://cdn.cloudflare.steamstatic.com/steam/apps/346110/ss_5.jpg">
  <div class="overlay"></div>
  <div class="content">
    <h2>🪨 Astraeos</h2>
    <div id="astra-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7877">Join</a>
  </div>
</div>

<!-- Ragnarok -->
<div class="card">
  <img class="server-img" src="https://cdn.cloudflare.steamstatic.com/steam/apps/346110/ss_6.jpg">
  <div class="overlay"></div>
  <div class="content">
    <h2>🔥 Ragnarok</h2>
    <div id="rag-status" class="status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7977">Join</a>
  </div>
</div>

<!-- Discord -->
<div class="card" style="padding:20px;">
  <h2>💬 Discord</h2>
  <a class="btn" href="https://discord.gg/YOURCODE">Join Community</a>
</div>

<div class="footer">
© Rhyse Gaming
</div>

</div>

<script>
async function checkServer(ip, port, elementId) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers?filter[search]=${ip}:${port}`);
    const data = await res.json();

    if (data.data.length > 0) {
      const server = data.data[0];
      document.getElementById(elementId).innerHTML =
        `<span class="online">● Online</span> (${server.attributes.players}/${server.attributes.maxPlayers})`;
    } else {
      document.getElementById(elementId).innerHTML =
        `<span class="offline">● Offline</span>`;
    }
  } catch {
    document.getElementById(elementId).innerHTML =
      `<span class="offline">● Unknown</span>`;
  }
}

function refreshAll() {
  checkServer("ark.rhysegaming.com", 7777, "island-status");
  checkServer("ark.rhysegaming.com", 7877, "astra-status");
  checkServer("ark.rhysegaming.com", 7977, "rag-status");
}

refreshAll();
setInterval(refreshAll, 30000);
</script>

</body>
</html>
