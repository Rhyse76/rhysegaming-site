<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.logo img {
  width: 260px;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #3b82f6); }
  to { filter: drop-shadow(0 0 25px #60a5fa); }
}

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  background: #0f172a;
  overflow: hidden;
}

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island { background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
.astra { background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
.rag { background: url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

.btn {
  margin: 6px;
  padding: 10px 18px;
  background: #2563eb;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 10px 20px;
  border-radius: 6px;
  display: none;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo">
  <img src="logo.png">
</div>

<div id="servers"></div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Join Server</h3>
    <p id="command"></p>
    <button class="btn" id="closeModal">Close</button>
  </div>
</div>

<script>
function serverCard(name,id,cls,port){
return `
<div class="card">
<div class="banner ${cls}"><h2>${name}</h2></div>
<div>
<div id="${id}-status">Checking...</div>

<button class="btn play" data-port="${port}">🚀 Play Now</button>
<button class="btn copy" data-port="${port}">📋 Copy</button>
<button class="btn how" data-port="${port}">💬 How</button>

</div>
</div>`;
}

document.getElementById("servers").innerHTML =
serverCard("🌍 Island","island","island",7777)+
serverCard("🪨 Astraeos","astra","astra",7877)+
serverCard("🔥 Ragnarok","rag","rag",7977);

// BUTTON EVENTS (FIXED)
document.querySelectorAll(".play").forEach(btn=>{
  btn.addEventListener("click",()=>{
    launch(btn.dataset.port);
  });
});

document.querySelectorAll(".copy").forEach(btn=>{
  btn.addEventListener("click",()=>{
    copyIP(btn.dataset.port);
  });
});

document.querySelectorAll(".how").forEach(btn=>{
  btn.addEventListener("click",()=>{
    showCommand(btn.dataset.port);
  });
});

document.getElementById("closeModal").addEventListener("click", closeModal);

// LAUNCH
function launch(port){
  const url=`steam://connect/ark.rhysegaming.com:${port}`;
  window.location.href=url;
  setTimeout(()=>showCommand(port),1500);
}

// COPY
function copyIP(port){
  const text=`ark.rhysegaming.com:${port}`;
  navigator.clipboard.writeText(text);
  toast("Copied: "+text);
}

// TOAST
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

// MODAL
function showCommand(port){
  document.getElementById("modal").style.display="flex";
  document.getElementById("command").innerText=
  `Press ~ in ARK and paste:\nopen ark.rhysegaming.com:${port}`;
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// STATUS
async function checkServer(id,el){
 try{
  const r=await fetch(`https://api.battlemetrics.com/servers/${id}`);
  const d=await r.json();
  const s=d.data.attributes;

  if(s.status!=="online"){
    document.getElementById(el).innerHTML=`<span class="offline">● Offline</span>`;
    return;
  }

  document.getElementById(el).innerHTML=
  `<span class="online">● Online</span> (${s.players}/${s.maxPlayers})`;
 }catch{
  document.getElementById(el).innerHTML=`<span class="offline">● Offline</span>`;
 }
}

function refresh(){
 checkServer("38310501","island-status");
 checkServer("38356867","astra-status");
 checkServer("38381239","rag-status");
}
refresh();
setInterval(refresh,30000);

// PARTICLES
const c=document.getElementById('particles');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<100;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2,v:Math.random()});
}

function draw(){
 x.clearRect(0,0,c.width,c.height);
 p.forEach(a=>{
  a.y+=a.v;
  if(a.y>c.height)a.y=0;
  x.beginPath();
  x.arc(a.x,a.y,a.s,0,6.28);
  x.fillStyle="#60a5fa";
  x.shadowBlur=10;
  x.shadowColor="#60a5fa";
  x.fill();
 });
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
