<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.hero {
  padding: 80px 20px 40px;
}

.logo {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #60a5fa, #22c55e, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  color: #94a3b8;
  margin-top: 10px;
}

/* NAV BAR */
.nav {
  margin-top: 20px;
}

.nav a {
  margin: 0 10px;
  color: #60a5fa;
  text-decoration: none;
  font-weight: bold;
}

.nav a:hover {
  color: white;
}

/* CARDS */
.container {
  padding: 20px;
}

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  overflow: hidden;
  background: #0f172a;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
  box-shadow: 0 0 30px rgba(37,99,235,0.8);
}

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
              url('https://picsum.photos/seed/island/1000/500');
}

.astra {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
              url('https://picsum.photos/seed/astra/1000/500');
}

.rag {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent),
              url('https://picsum.photos/seed/rag/1000/500');
}

.content {
  padding: 15px;
}

.status {
  font-size: 14px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 22px;
  background: #2563eb;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}

.btn:hover {
  background: #1d4ed8;
}

/* DISCORD CARD */
.discord {
  padding: 20px;
}

.footer {
  margin: 40px;
  color: #64748b;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">
  <div class="logo">RHYSE GAMING</div>
  <div class="tagline">ARK Survival Ascended Cluster</div>

  <div class="nav">
    <a href="#servers">Servers</a>
    <a href="https://play.rhysegaming.com">Play</a>
    <a href="https://discord.gg/vm8tstWJTh" target="_blank">Discord</a>
  </div>
</div>

<div id="servers" class="container">

<div class="card">
  <div class="banner island">
    <h2>🌍 Island</h2>
  </div>
  <div class="content">
    <div id="island-status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7777">Join Server</a>
  </div>
</div>

<div class="card">
  <div class="banner astra">
    <h2>🪨 Astraeos</h2>
  </div>
  <div class="content">
    <div id="astra-status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7877">Join Server</a>
  </div>
</div>

<div class="card">
  <div class="banner rag">
    <h2>🔥 Ragnarok</h2>
  </div>
  <div class="content">
    <div id="rag-status">Checking...</div>
    <a class="btn" href="steam://connect/ark.rhysegaming.com:7977">Join Server</a>
  </div>
</div>

<!-- DISCORD -->
<div class="card discord">
  <h2>💬 Join Our Community</h2>
  <p>Stay connected, get updates, and chat with players</p>
  <a class="btn" href="https://discord.gg/vm8tstWJTh" target="_blank">Join Discord</a>
</div>

</div>

<div class="footer">© Rhyse Gaming</div>

<script>
// SERVER STATUS
async function checkServer(ip, port, id) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers?filter[search]=${ip}:${port}`);
    const data = await res.json();

    if (data.data.length > 0) {
      const s = data.data[0];
      document.getElementById(id).innerHTML =
        `<span class="online">● Online</span> (${s.attributes.players}/${s.attributes.maxPlayers})`;
    } else {
      document.getElementById(id).innerHTML =
        `<span class="offline">● Offline</span>`;
    }
  } catch {
    document.getElementById(id).innerHTML =
      `<span class="offline">● Unknown</span>`;
  }
}

function refresh() {
  checkServer("ark.rhysegaming.com",7777,"island-status");
  checkServer("ark.rhysegaming.com",7877,"astra-status");
  checkServer("ark.rhysegaming.com",7977,"rag-status");
}

refresh();
setInterval(refresh,30000);

// PARTICLES
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p=>{
    p.y += p.speed;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
