<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyse Gaming | Ark Cluster</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue-primary: #2563eb;
            --blue-glow: #3b82f6;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7); /* Glassmorphism */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, var(--bg-dark), #000);
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10000;
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo { font-weight: bold; font-size: 1.2rem; color: var(--blue-glow); text-decoration: none; letter-spacing: 1px; }

        .content { flex: 1; padding-top: 20px; }

        .logo img { width: 220px; animation: glowPulse 3s infinite; }
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 10px var(--blue-glow)); }
            50% { filter: drop-shadow(0 0 25px var(--blue-glow)); }
        }

        .card {
            max-width: 600px;
            margin: 25px auto;
            border-radius: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { 
            transform: translateY(-8px) scale(1.01); 
            border-color: var(--blue-glow);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
        }

        .online-card { border-left: 4px solid #22c55e; }

        .banner {
            height: 150px;
            display: flex; align-items: flex-end;
            padding: 20px;
            background-size: cover; background-position: center;
        }

        .island { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
        .astra { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
        .rag { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

        .btn-group { padding: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }

        .btn-play { background: #22c55e; }
        .btn-play:hover { background: #16a34a; transform: scale(1.05); }
        .btn-manual { background: #475569; }
        .btn-manual:hover { background: #64748b; }
        .btn-discord { background: #5865F2; }

        .online { color: #22c55e; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .offline { color: #ef4444; }

        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--blue-primary);
            color: white; padding: 12px 24px;
            border-radius: 50px; display: none;
            z-index: 10001; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        footer { padding: 30px; margin-top: 50px; background: rgba(15, 23, 42, 0.8); border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<nav>
    <a href="#" class="nav-logo">RHYSE GAMING</a>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-discord" onclick="window.open('https://discord.gg/xJM3Nkce8Y')"><i class="fab fa-discord"></i> Discord</button>
        <button class="btn btn-manual" onclick="window.location.href='contact.html'"><i class="fas fa-envelope"></i></button>
    </div>
</nav>

<div class="content">
    <div class="logo">
        <img src="logo.png" alt="Rhyse Gaming Logo">
    </div>
    <div id="servers"></div>
</div>

<div id="toast" class="toast"></div>

<footer>
    <p>&copy; 2026 <strong>Rhyse Gaming</strong>. All Rights Reserved.</p>
</footer>

<script>
    const servers = [
        { name: "The Island", id: "island", gamePort: 7777, queryPort: 27025 },
        { name: "Astraeos", id: "astra", gamePort: 7877, queryPort: 27027 },
        { name: "Ragnarok", id: "rag", gamePort: 7977, queryPort: 27029 }
    ];

    const container = document.getElementById("servers");

    servers.forEach(s => {
        const card = document.createElement("div");
        card.className = "card";
        card.id = `${s.id}-card`;

        card.innerHTML = `
            <div class="banner ${s.id}"><h2>${s.name}</h2></div>
            <div id="${s.id}-status" style="padding: 20px 15px 5px;">Checking Status...</div>
            <div class="btn-group">
                <button class="btn btn-play" onclick="launchGame('${s.queryPort}')">
                    <i class="fas fa-rocket"></i> Play Now
                </button>
                <button class="btn btn-manual" onclick="copyJoin('${s.gamePort}')">
                    <i class="fas fa-terminal"></i> Manual Connection
                </button>
            </div>
        `;
        container.appendChild(card);
    });

    function launchGame(qPort) {
        // Steam protocol for ASA using the Query Port
        window.location.href = `steam://run/2399830//+connect%20ark.rhysegaming.com:${qPort}`;
        showToast("🚀 Launching via Steam...");
    }

    function copyJoin(gPort) {
        const cmd = `open ark.rhysegaming.com:${gPort}`;
        navigator.clipboard.writeText(cmd);
        showToast("📋 Command Copied! Paste in ASA console (~)");
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }

    async function checkStatus(s) {
        try {
            const r = await fetch(`https://api.rhysegaming.com/status/${s.id}`);
            const data = await r.json();
            const statusEl = document.getElementById(`${s.id}-status`);
            const card = document.getElementById(`${s.id}-card`);
            
            if (data.online) {
                card.classList.add("online-card");
                statusEl.innerHTML = `<span class="online">● Online</span> <br> 
                                      <small style="opacity:0.6">${data.map}</small>`;
            } else {
                card.classList.remove("online-card");
                statusEl.innerHTML = `<span class="offline">● Offline</span>`;
            }
        } catch {
            document.getElementById(`${s.id}-status`).innerHTML = `<span class="offline">● Offline</span>`;
        }
    }

    function refresh() { servers.forEach(s => checkStatus(s)); }
    refresh();
    setInterval(refresh, 30000);

    // BACKGROUND PARTICLES (Now with interactive hover)
    const c = document.getElementById('particles');
    const x = c.getContext('2d');
    let p = [];
    let mouse = { x: null, y: null };

    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    window.onresize = () => { c.width = innerWidth; c.height = innerHeight; };
    c.width = innerWidth; c.height = innerHeight;

    for(let i=0; i<80; i++) p.push({ x:Math.random()*c.width, y:Math.random()*c.height, vx:(Math.random()-0.5)*0.3, vy:0.6 });

    function draw() {
        x.clearRect(0, 0, c.width, c.height);
        p.forEach(a => {
            a.y += a.vy; a.x += a.vx;
            if(a.y > c.height) a.y = 0;
            if(a.x > c.width) a.x = 0; if(a.x < 0) a.x = c.width;

            // Interactive "push" away from mouse
            let dx = a.x - mouse.x; let dy = a.y - mouse.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 120) { a.x += dx/20; a.y += dy/20; }

            x.beginPath(); x.arc(a.x, a.y, 1.5, 0, 6.28);
            x.fillStyle = "rgba(96, 165, 250, 0.8)"; x.fill();

            p.forEach(b => {
                let d2 = Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
                if(d2 < 100) {
                    x.strokeStyle = `rgba(96, 165, 250, ${1 - d2/100 * 0.3})`;
                    x.lineWidth = 0.5; x.beginPath(); x.moveTo(a.x, a.y); x.lineTo(b.x, b.y); x.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>

<div style="position: fixed; bottom: 15px; right: 15px; opacity: 0.1;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.1'">
    <a href="http://100.67.222.11:3001/" target="_blank" style="text-decoration: none;">⚙️</a>
</div>

</body>
</html>
