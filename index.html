<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyse Gaming | Ark Cluster</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue-primary: #2563eb;
            --blue-glow: #3b82f6;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --sidebar-w: 240px;
        }

        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: radial-gradient(circle at center, var(--bg-dark), #000); color: white; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-logo { font-weight: bold; font-size: 1.2rem; color: var(--blue-glow); text-decoration: none; letter-spacing: 1px; }
        .main-layout { display: flex; flex: 1; position: relative; }
        .sidebar { width: var(--sidebar-w); background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 15px; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 65px; height: calc(100vh - 65px); }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-top: 20px; margin-bottom: 10px; padding-left: 10px; }
        .sidebar-link { padding: 12px 15px; background: rgba(255, 255, 255, 0.03); border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: white; border: 1px solid transparent; }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--blue-glow); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; background: #ef4444; }
        .status-dot.online-dot { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .content { flex: 1; padding: 40px 20px; text-align: center; }
        .card { display: none; max-width: 600px; margin: 0 auto 30px; border-radius: 15px; background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
        .card.show-manual { display: block; }
        .online-card { border-left: 4px solid #22c55e; }
        .banner { height: 140px; display: flex; align-items: flex-end; padding: 20px; background-size: cover; background-position: center; }
        .island { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
        .astra { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
        .rag { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }
        .switch { background: linear-gradient(transparent, #0f172a), url('https://images.unsplash.com/photo-1542751371-adc38448a05e'); }
        .btn-group { padding: 15px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 8px; color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-play { background: #22c55e; }
        .btn-manual { background: #475569; }
        .online { color: #22c55e; font-weight: bold; }
        .offline { color: #ef4444; }
        .player-pill { background: rgba(59, 130, 246, 0.2); color: var(--blue-glow); padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; margin-left: 10px; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<nav>
    <a href="#" class="nav-logo">RHYSE GAMING</a>
    <button class="btn" style="background:#5865F2" onclick="window.open('https://discord.gg/xJM3Nkce8Y')"><i class="fab fa-discord"></i> Discord</button>
</nav>

<div class="main-layout">
    <div class="sidebar"><div id="sidebar-links"></div></div>
    <div class="content">
        <div class="logo-container"><img src="logo.png" style="width:220px" alt="Rhyse Gaming"></div>
        <div id="servers"></div>
    </div>
</div>

<script>
    const servers = [
        { name: "The Island (ASA)", id: "island", type: "Ascended", gamePort: 7777 },
        { name: "Astraeos (ASA)", id: "astra", type: "Ascended", gamePort: 7877 },
        { name: "Ragnarok (ASA)", id: "rag", type: "Ascended", gamePort: 7977 },
        { name: "Rhyse Gaming (Switch)", id: "switch", type: "Evolved", gamePort: 0 }
    ];

    const container = document.getElementById("servers");
    const sidebarContainer = document.getElementById("sidebar-links");
    const categories = ["Ascended", "Evolved"];

    categories.forEach(cat => {
        const header = document.createElement("div");
        header.className = "sidebar-title";
        header.innerText = cat;
        sidebarContainer.appendChild(header);

        servers.filter(s => s.type === cat).forEach(s => {
            const link = document.createElement("a");
            link.className = "sidebar-link";
            link.innerHTML = `<span>${s.name}</span> <div class="status-dot" id="${s.id}-dot"></div>`;
            link.onclick = (e) => { e.preventDefault(); document.getElementById(`${s.id}-card`).classList.add('show-manual'); document.getElementById(`${s.id}-card`).scrollIntoView({ behavior: 'smooth' }); };
            sidebarContainer.appendChild(link);

            const card = document.createElement("div");
            card.className = "card show-manual";
            card.id = `${s.id}-card`;
            card.innerHTML = `
                <div class="banner ${s.id}"><h2>${s.name}</h2></div>
                <div id="${s.id}-status" style="padding: 20px 15px 5px; text-align: center;">Checking...</div>
                <div class="btn-group">
                    ${s.type === 'Ascended' ? `<button class="btn btn-play" onclick="window.location.href='steam://run/2399830//+connect%20ark.rhysegaming.com:${s.gamePort}'"><i class="fas fa-rocket"></i> Play</button>` : ''}
                    <button class="btn btn-manual" onclick="navigator.clipboard.writeText('open ark.rhysegaming.com:${s.gamePort}')"><i class="fas fa-copy"></i> IP</button>
                </div>
            `;
            container.appendChild(card);
        });
    });

    async function checkStatus() {
        try {
            const r = await fetch('https://api.rhysegaming.com/api/public-stats');
            const serverList = await r.json();
            serverList.forEach(data => {
                const s = servers.find(server => server.id === data.id);
                if (!s) return;
                const statusEl = document.getElementById(`${s.id}-status`);
                const dot = document.getElementById(`${s.id}-dot`);
                const card = document.getElementById(`${s.id}-card`);
                if (data.online) {
                    card.classList.add("online-card");
                    dot.classList.add("online-dot");
                    statusEl.innerHTML = `<span class="online">● Online</span> <span class="player-pill">${data.players || 0} Survivors</span>`;
                } else {
                    card.classList.remove("online-card");
                    dot.classList.remove("online-dot");
                    statusEl.innerHTML = `<span class="offline">● Offline</span>`;
                }
            });
        } catch (err) { console.error("Update failed"); }
    }
    checkStatus(); setInterval(checkStatus, 30000);
</script>
</body>
</html>
