<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color: white;
  text-align: center;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  padding: 80px 20px;
}

h1 {
  font-size: 48px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 25px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.status {
  margin-top: 10px;
  font-size: 16px;
}

.online {
  color: #22c55e;
}

.offline {
  color: #ef4444;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 18px;
  color: white;
  background: #2563eb;
  border-radius: 10px;
  text-decoration: none;
}

.footer {
  margin-top: 60px;
  font-size: 14px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

<h1>Rhyse Gaming</h1>

<div class="card">
  <h2>🌍 Island</h2>
  <div id="island-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7777">Join Server</a>
</div>

<div class="card">
  <h2>🪨 Astraeos</h2>
  <div id="astra-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7877">Join Server</a>
</div>

<div class="card">
  <h2>🔥 Ragnarok</h2>
  <div id="rag-status" class="status">Checking...</div>
  <a class="btn" href="steam://connect/ark.rhysegaming.com:7977">Join Server</a>
</div>

<div class="footer">
© Rhyse Gaming
</div>

</div>

<script>
async function checkServer(ip, port, elementId) {
  try {
    const res = await fetch(`https://api.battlemetrics.com/servers?filter[search]=${ip}:${port}`);
    const data = await res.json();

    if (data.data.length > 0) {
      const server = data.data[0];
      const players = server.attributes.players;
      const max = server.attributes.maxPlayers;

      document.getElementById(elementId).innerHTML =
        `<span class="online">● Online</span> (${players}/${max})`;
    } else {
      document.getElementById(elementId).innerHTML =
        `<span class="offline">● Offline</span>`;
    }
  } catch {
    document.getElementById(elementId).innerHTML =
      `<span class="offline">● Unknown</span>`;
  }
}

checkServer("ark.rhysegaming.com", 7777, "island-status");
checkServer("ark.rhysegaming.com", 7877, "astra-status");
checkServer("ark.rhysegaming.com", 7977, "rag-status");
</script>

</body>
</html>
