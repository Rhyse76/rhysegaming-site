<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color: white;
  text-align: center;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  padding: 80px 20px;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.tagline {
  color: #94a3b8;
  margin-bottom: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 30px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 14px 30px;
  font-size: 18px;
  color: white;
  background: #2563eb;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  background: #1d4ed8;
}

.secondary {
  background: #475569;
}

.secondary:hover {
  background: #334155;
}

.footer {
  margin-top: 60px;
  font-size: 14px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

  <h1>Rhyse Gaming</h1>
  <div class="tagline">Community Servers • Smooth Gameplay • No BS</div>

  <div class="card">
    <h2>🎮 ARK Cluster</h2>
    <p>Join our ASA cluster instantly</p>
    <a class="btn" href="https://play.rhysegaming.com">Play Now</a>
  </div>

  <div class="card">
    <h2>💬 Discord</h2>
    <p>Join the community</p>
    <a class="btn secondary" href="https://discord.gg/YOURCODE">Join Discord</a>
  </div>

  <div class="footer">
    © Rhyse Gaming
  </div>

</div>

</body>
</html>
