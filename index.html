<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyse Gaming</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
  pointer-events: none;
}

.logo img {
  width: 260px;
  margin-top: 20px;
  animation: glowPulse 3s infinite;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 10px #3b82f6); }
  50% { filter: drop-shadow(0 0 30px #3b82f6); }
  100% { filter: drop-shadow(0 0 10px #3b82f6); }
}

.card {
  max-width: 600px;
  margin: 25px auto;
  border-radius: 15px;
  background: #0f172a;
  overflow: hidden;
  transition: 0.3s;
}

.card.online-card {
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
}

.card:hover {
  transform: translateY(-5px);
}

.banner {
  height: 200px;
  display: flex;
  align-items: flex-end;
  padding: 15px;
  background-size: cover;
}

.island { background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470'); }
.astra { background:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); }
.rag { background:url('https://images.unsplash.com/photo-1508766206392-8bd5cf550d1c'); }

.btn {
  margin: 6px;
  padding: 10px 18px;
  background: #2563eb;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  border: none;
}

.btn:hover {
  background: #3b82f6;
  box-shadow: 0 0 12px #3b82f6;
}

.discord { background:#5865F2; }

.online { color:#22c55e; }
.offline { color:#ef4444; }

.bar {
  width: 80%;
  height: 8px;
  background: #1e293b;
  margin: 8px auto;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  transition: .5s;
}

.ping {
  font-size: 12px;
  opacity: .7;
}

.toast {
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 20px;
  border-radius:6px;
  display:none;
  z-index:10000;
}

.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:#0f172a;
  padding:25px;
  border-radius:10px;
  max-width:400px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo">
  <img src="logo.png">
</div>

<div style="margin-top:10px;">
  <button class="btn discord" onclick="joinDiscord()">Join Discord</button>
</div>

<div id="servers"></div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>🎮 How to Join</h2>
    <p id="command"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const MAX_PLAYERS = 70;

const servers = [
  {name:"Island", id:"island", port:7777},
  {name:"Astraeos", id:"astra", port:7877},
  {name:"Ragnarok", id:"rag", port:7977}
];

const container = document.getElementById("servers");

servers.forEach(s=>{
  const card = document.createElement("div");
  card.className = "card";
  card.id = `${s.id}-card`;

  card.innerHTML = `
    <div class="banner ${s.id}"><h2>${s.name}</h2></div>
    <div id="${s.id}-status">Checking...</div>
  `;

  const btnContainer = document.createElement("div");

  const how = document.createElement("button");
  how.className = "btn";
  how.innerText = "🎮 How to Join";

  how.onclick = () => {
    const command = `open ark.rhysegaming.com:${s.port}`;
    navigator.clipboard.writeText(command);
    toast("✅ Command copied!");
    showModal(s.port);
  };

  btnContainer.appendChild(how);
  card.appendChild(btnContainer);
  container.appendChild(card);
});

// MODAL
function showModal(port){
  document.getElementById("modal").style.display="flex";
  document.getElementById("command").innerText =
`1. Open ARK
2. Press ~
3. Paste:

open ark.rhysegaming.com:${port}

4. Press Enter`;
}

window.closeModal = function(){
  document.getElementById("modal").style.display="none";
}

// DISCORD
window.joinDiscord = function(){
  window.open("https://discord.gg/xJM3Nkce8Y","_blank");
}

// TOAST
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>{ t.style.display = "none"; },2000);
}

// 🔥 NEW API STATUS SYSTEM
async function check(name, el){
 try{
  const r = await fetch(`https://animated-aims-fleece-among.trycloudflare.com/status/${name}`);
  const s = await r.json();

  const card = document.getElementById(el.replace("-status","-card"));

  if(s.online){
    card.classList.add("online-card");

    let percent = Math.min((s.players/MAX_PLAYERS)*100,100);

    document.getElementById(el).innerHTML = `
      <div class="online">Online (${s.players})</div>
      <div class="ping">${s.map}</div>
      <div class="bar">
        <div class="fill" style="width:${percent}%"></div>
      </div>
    `;
  } else {
    card.classList.remove("online-card");
    document.getElementById(el).innerHTML = `<span class="offline">Offline</span>`;
  }

 } catch {
  document.getElementById(el).innerHTML = `<span class="offline">Offline</span>`;
 }
}

function refresh(){
  check("island","island-status");
  check("astra","astra-status");
  check("rag","rag-status");
}

refresh();
setInterval(refresh,30000);

// PARTICLES
const c=document.getElementById('particles');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  x.clearRect(0,0,c.width,c.height);

  p.forEach(a=>{
    a.y+=0.5;
    if(a.y>c.height)a.y=0;

    x.beginPath();
    x.arc(a.x,a.y,2,0,6.28);
    x.fillStyle="#60a5fa";
    x.fill();

    p.forEach(b=>{
      let dx=a.x-b.x;
      let dy=a.y-b.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<80){
        x.strokeStyle="rgba(96,165,250,0.2)";
        x.beginPath();
        x.moveTo(a.x,a.y);
        x.lineTo(b.x,b.y);
        x.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}

draw();

});
</script>

</body>
</html>
